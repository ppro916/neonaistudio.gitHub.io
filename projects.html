<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Neon AI Studio - Projects</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background: radial-gradient(circle at 20% 30%, #0a0a1a, #010105);
  color:#e0e0ff;
}

/* NAVBAR */
.glass-nav{
  position:sticky;
  top:0;
  z-index:1000;
  padding:1rem 2rem;
  background:rgba(20,20,45,0.5);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(0,255,255,0.2);
}

.nav-container{
  max-width:1400px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:1.5rem;
  font-weight:800;
  background: linear-gradient(45deg,#0ff,#f0f);
  -webkit-background-clip: text;
  color: transparent;
}

.logo img{
  height:40px;
}

.nav-menu{
  display:flex;
  gap:1.5rem;
  list-style:none;
}

.nav-menu a{
  color:#ddd;
  text-decoration:none;
  transition:0.3s;
}

.nav-menu a:hover{
  color:#0ff;
  text-shadow:0 0 5px #0ff;
}

.menu-toggle{
  display:none;
  font-size:1.8rem;
  color:#fff;
  background:none;
  border:none;
}

/* MOBILE */
@media(max-width:768px){
.nav-menu{
  display:none;
  flex-direction:column;
  position:absolute;
  top:70px;
  left:0;
  width:100%;
  background:#000;
  padding:1rem;
  text-align:center;
}
.nav-menu.active{display:flex;}
.menu-toggle{display:block;}
}

/* SECTION */
.section{
  padding:60px 20px;
  text-align:center;
}

.section h2{
  font-size:2rem;
  color:#0ff;
  text-shadow:0 0 10px #0ff;
}

/* GRID */
.projects-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
  margin-top:30px;
}

/* CARD */
.project-card{
  background:#0b0b14;
  border-radius:20px;
  overflow:hidden;
  border:1px solid rgba(0,255,255,0.2);
  transition:0.3s;
}

.project-card:hover{
  transform:translateY(-10px);
  box-shadow:0 0 25px #0ff;
}

.project-card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.project-card h4{
  padding:10px;
  color:#0ff;
}

/* BUTTON */
.btn{
  display:inline-block;
  margin:10px;
  padding:10px 20px;
  border-radius:30px;
  background:#0ff;
  color:#000;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="glass-nav">
<div class="nav-container">

<div class="logo">
<img src="neon_ai_studio_logo.png">
<span>NEON AI STUDIO</span>
</div>

<button class="menu-toggle" id="menu-toggle">☰</button>

<ul class="nav-menu" id="nav-menu">
<li><a href="index.html">Home</a></li>
<li><a href="ser.html">Services</a></li>
<li><a href="pricing.html">Pricing</a></li>
<li><a href="projects.html">Projects</a></li>
<li><a href="custom.html">Custom Plan</a></li>
<li><a href="chat.html">Chat</a></li>
</ul>

</div>
</nav>

<!-- PROJECTS -->
<section class="section">

<h2>🔥 Featured Projects</h2>
<p>AI-powered visuals & motion magic</p>

<div class="projects-grid">

<div class="project-card">
<img src="https://picsum.photos/400/300?1">
<h4>AI Cinematic Reel</h4>
</div>

<div class="project-card">
<img src="https://picsum.photos/400/300?2">
<h4>Cyber Poster Series</h4>
</div>

<div class="project-card">
<img src="https://picsum.photos/400/300?3">
<h4>3D Product Visual</h4>
</div>

<div class="project-card">
<img src="https://picsum.photos/400/300?4">
<h4>Viral Shorts Pack</h4>
</div>

</div>

<a href="https://wa.me/917038821854" class="btn">📞 Order on WhatsApp</a>

</section>

<script>
document.getElementById("menu-toggle").onclick = function(){
document.getElementById("nav-menu").classList.toggle("active");
};
</script>

</body>
</html>
