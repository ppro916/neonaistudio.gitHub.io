<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Neon AI Studio - Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background: radial-gradient(circle at 20% 30%, #0a0a1a, #010105);
  color:#e0e0ff;
}

/* NAVBAR */
.glass-nav{
  position:sticky;
  top:0;
  z-index:1000;
  padding:1rem 2rem;
  background:rgba(20,20,45,0.5);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(0,255,255,0.2);
}

.nav-container{
  max-width:1400px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:1.5rem;
  font-weight:800;
  background: linear-gradient(45deg,#0ff,#f0f);
  -webkit-background-clip: text;
  color: transparent;
}

.logo img{height:40px;}

.nav-menu{
  display:flex;
  gap:1.5rem;
  list-style:none;
}

.nav-menu a{
  color:#ddd;
  text-decoration:none;
}

.nav-menu a:hover{
  color:#0ff;
  text-shadow:0 0 5px #0ff;
}

.menu-toggle{
  display:none;
  font-size:1.8rem;
  color:#fff;
  background:none;
  border:none;
}

/* MOBILE */
@media(max-width:768px){
.nav-menu{
  display:none;
  flex-direction:column;
  position:absolute;
  top:70px;
  left:0;
  width:100%;
  background:#000;
  padding:1rem;
  text-align:center;
}
.nav-menu.active{display:flex;}
.menu-toggle{display:block;}
}

/* CHAT BOX */
.chat-container{
  max-width:600px;
  margin:40px auto;
  background:#0b0b14;
  border-radius:20px;
  padding:20px;
  border:1px solid rgba(0,255,255,0.2);
  box-shadow:0 0 20px rgba(0,255,255,0.1);
  display:flex;
  flex-direction:column;
  height:70vh;
}

.messages{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* MESSAGE */
.msg{
  max-width:70%;
  padding:10px 15px;
  border-radius:15px;
  font-size:14px;
}

.user{
  background:#0ff;
  color:#000;
  align-self:flex-end;
}

.bot{
  background:#111;
  border:1px solid #0ff;
}

/* INPUT */
.input-box{
  display:flex;
  gap:10px;
  margin-top:10px;
}

input{
  flex:1;
  padding:12px;
  border-radius:30px;
  border:1px solid #0ff;
  background:#111;
  color:#fff;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:30px;
  background:linear-gradient(90deg,#0ff,#f0f);
  color:#000;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="glass-nav">
<div class="nav-container">

<div class="logo">
<img src="neon_ai_studio_logo.png">
<span>NEON AI STUDIO</span>
</div>

<button class="menu-toggle" id="menu-toggle">☰</button>

<ul class="nav-menu" id="nav-menu">
<li><a href="index.html">Home</a></li>
<li><a href="ser.html">Services</a></li>
<li><a href="pricing.html">Pricing</a></li>
<li><a href="projects.html">Projects</a></li>
<li><a href="custom.html">Custom Plan</a></li>
<li><a href="chat.html">Chat</a></li>
</ul>

</div>
</nav>

<!-- CHAT -->
<div class="chat-container">

<div id="messages" class="messages"></div>

<div class="input-box">
<input id="input" placeholder="Type your message...">
<button onclick="send()">Send</button>
</div>

</div>

<script>
document.getElementById("menu-toggle").onclick = function(){
document.getElementById("nav-menu").classList.toggle("active");
};

function send(){
let input = document.getElementById("input");
let text = input.value.trim();
if(!text) return;

addMessage(text,"user");

setTimeout(()=>{
addMessage("We will contact you soon 😊","bot");
},500);

input.value="";
}

/* ADD MESSAGE */
function addMessage(text,type){
let div = document.createElement("div");
div.className = "msg "+type;
div.innerText = text;

document.getElementById("messages").appendChild(div);
div.scrollIntoView();
}

/* ENTER KEY */
document.getElementById("input").addEventListener("keypress",function(e){
if(e.key==="Enter") send();
});
</script>

</body>
</html>
